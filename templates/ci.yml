# GitHub Actions CI template
# Canonical 3-stage pipeline: unit → integration → E2E
#
# Assumptions:
#   - Unit/component tests: vitest (npm run test:coverage)
#   - Integration tests: vitest with separate config (npm run test:integration)
#   - E2E tests: Playwright (npm run test:e2e)
#   - Test DB: separate from production, connection string in DATABASE_URL_TEST secret
#   - Auth: dev cookie mode for E2E (do NOT set auth secret in E2E job)
#
# Required GitHub Secrets:
#   DATABASE_URL_TEST — connection string for an isolated test database branch
#
# Run locally what CI runs (catch failures before the push, not after a 3-min
# round-trip). Every stage below maps to a local script:
#   npm run test:coverage      # unit job
#   npm run test:integration   # integration job (needs DATABASE_URL_TEST in .env)
#   npm run test:e2e           # e2e job (needs DATABASE_URL_TEST in .env)

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: Unit & Component Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high   # fail on high/critical CVEs
      - run: npm run typecheck
      - run: bash scripts/check-features.sh   # fails if any page/route is missing from FEATURES.md
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  integration:
    name: DB Integration Tests
    runs-on: ubuntu-latest
    needs: unit
    env:
      DATABASE_URL_TEST: ${{ secrets.DATABASE_URL_TEST }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:integration

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: integration
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_TEST }}
      DATABASE_URL_TEST: ${{ secrets.DATABASE_URL_TEST }}
      # Auth secret intentionally absent — app falls back to dev cookie mode
      # which E2E fixtures depend on. Never set the real auth secret here.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        # Playwright webServer block starts the dev server and waits for it.
        # global-setup.ts handles DB migrations + seeding.
        # Do NOT manually start the server or use wait-on here.
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
